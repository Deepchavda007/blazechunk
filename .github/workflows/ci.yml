name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtualenv and install dev deps
        run: |
          uv venv
          uv pip install pytest numpy maturin

      - name: Build the extension
        run: |
          source .venv/bin/activate
          maturin develop --release -m packages/python/Cargo.toml

      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest packages/python/tests -v
