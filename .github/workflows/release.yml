name: Release

# Publishes blazechunk to PyPI when you publish a GitHub Release.
# Wheels are built for Linux / macOS / Windows across Python 3.10–3.13, plus an
# sdist, and uploaded via PyPI Trusted Publishing (OIDC) — no API token stored.
# See the "Publishing" section of the README / setup notes for the one-time
# PyPI trusted-publisher configuration.

on:
  release:
    types: [published]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wheels:
    name: Wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: 2_28
          - os: macos-latest
            target: x86_64-apple-darwin
            manylinux: auto
          - os: macos-latest
            target: aarch64-apple-darwin
            manylinux: auto
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: auto
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist -m packages/python/Cargo.toml --interpreter 3.10 3.11 3.12 3.13

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m packages/python/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi          # optional GitHub Environment for extra protection
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # No `password:` — authentication happens over OIDC via the
          # trusted publisher you configure on PyPI. To use an API token
          # instead, delete the `permissions`/`environment` above and set:
          #   password: ${{ secrets.PYPI_API_TOKEN }}
